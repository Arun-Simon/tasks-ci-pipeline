name: quality-Gate
on:
  push: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm build
      
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: npm test

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: npm run lint
